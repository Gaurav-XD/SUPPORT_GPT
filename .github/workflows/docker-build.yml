name: Docker Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        run: docker build -t supportgpt-backend ./backend
      - name: Build frontend image
        run: docker build -t supportgpt-frontend ./frontend
